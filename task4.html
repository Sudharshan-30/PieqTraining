<html>
    <head>
        <title>To Do List</title>
        <style>
            body {
                font-family: Arial;
                display: flex;
                justify-content: center;
                align-items: center;
                background-color: grey;
            }

            .container {
                background: white;
                padding: 2px;
                border-radius: 10px;
                width: 300px;
                text-align: center;
            }

            input {
                padding: 8px;
                width: 70%;
            }

            button {
                padding: 8px;
                margin-top: 10px;
                cursor: pointer;
            }

            ul {
                margin-top: 15px;
                text-align: left;
            }

            li {
                margin: 5px 0;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>My - To Do List</h1>
            <input type="text" placeholder="Enter Item" id="toDoItem">
            <br>
            <button onclick="addItem()">Add Item</button>
            <ul id="list"></ul>
        </div>
        <script>
            function addItem(){
                let input = document.getElementById("toDoItem");
                let text = input.value;
                if(text === "") return;
                let li = document.createElement("li");
                li.textContent = text;
                document.getElementById("list").appendChild(li);
                input.value = "";
            }
        </script>
    </body>
</html>
